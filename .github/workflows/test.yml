name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  # E2E Playwright : exécution locale contre la prod uniquement
  #   cp .env.e2e.example .env.e2e.local  →  pnpm test:e2e
